name: Build APK

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: https://gradle.com/terms-of-service
          build-scan-terms-of-use-agree: "yes"

      - name: Run KSP Debug
        run: |
          chmod +x gradlew
          ./gradlew :app:kspGmsMobileUniversalReleaseKotlin \
            --stacktrace \
            --info \
            --warning-mode all \
            --scan \
            --no-daemon

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ksp-debug
          path: |
            **/build/reports/**
            **/build/generated/**
            **/build/tmp/**
            **/*.log
